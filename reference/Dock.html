<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IzanOS — Dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #060810;
    --bg-2:         #0a0e1c;
    --cyan:         #00d4ff;
    --violet:       #7c3aed;
    --text:         #f0f4ff;
    --text-2:       #8892a4;
    --text-3:       #4a5568;
    --terminal:     #00ff88;
    --orange:       #ff6b00;
    --teal:         #06b6d4;

    --inter:        'Inter', system-ui, sans-serif;
    --mono:         'JetBrains Mono', ui-monospace, monospace;
  }

  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--inter); }

  /* ────────────────  DESKTOP  ──────────────── */
  .desktop {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124, 58, 237, 0.08), transparent 70%),
      radial-gradient(ellipse 70% 50% at 85% 90%, rgba(0, 212, 255, 0.06), transparent 70%),
      var(--bg);
  }
  canvas#particles { position: fixed; inset: 0; pointer-events: none; opacity: .55; }

  /* Subtle scanline veil over everything (premium CRT-ish flavour) */
  .desktop::after{
    content:""; position:fixed; inset:0; pointer-events:none;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
  }

  /* Demo helper text — purely so the design isn't floating in a void */
  .hint{
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
    color: rgba(136, 146, 164, 0.5); text-transform: uppercase;
    pointer-events: none;
  }
  .hint b{ color: rgba(0,212,255,.65); font-weight: 500; }

  /* ────────────────  BOTTOM-LEFT  IzanOS  ──────────────── */
  .brand {
    position: fixed; bottom: 22px; left: 24px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none; user-select: none;
  }
  .brand svg { filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.55)); }
  .brand .name {
    font-family: var(--inter); font-weight: 700; font-size: 13px;
    color: var(--text); letter-spacing: .01em;
  }
  .brand .name span{ color: var(--cyan); font-weight: 800; }

  /* ────────────────  BOTTOM-RIGHT  CLOCK  ──────────────── */
  .clock {
    position: fixed; bottom: 22px; right: 24px;
    text-align: right; font-family: var(--mono);
    user-select: none; pointer-events: none;
  }
  .clock .time { font-size: 13px; color: #aab3c3; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: .04em; }
  .clock .date { font-size: 10.5px; color: var(--text-3); margin-top: 2px; letter-spacing: .14em; }

  /* ────────────────  DOCK  ──────────────── */
  .dock-wrap{
    position: fixed; left: 50%; bottom: 18px;
    transform: translateX(-50%);
    z-index: 50;
  }
  .dock{
    position: relative;
    display: flex; align-items: flex-end; gap: 14px;
    padding: 10px 14px 10px 14px;
    border-radius: 22px;
    background:
      linear-gradient(180deg, rgba(20,26,44,.55), rgba(8,11,22,.78));
    border: 1px solid rgba(0, 212, 255, 0.12);
    box-shadow:
      0 30px 60px -20px rgba(0, 0, 0, 0.85),
      0 12px 30px -10px rgba(0, 212, 255, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.06),
      inset 0 -1px 0 rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
  }

  /* Top hairline accent — premium touch */
  .dock::before{
    content:""; position:absolute; top:0; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.35), transparent);
  }

  .dock-item{
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    transform-origin: bottom center;
    will-change: transform;
  }

  .dock-icon{
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transform-origin: bottom center;
    transition: transform .35s cubic-bezier(.34, 1.56, .64, 1),
                filter   .25s ease;
    will-change: transform, filter;
    position: relative;
  }
  .dock.is-hovering .dock-icon{
    transition: transform .12s cubic-bezier(.2,.8,.2,1),
                filter .25s ease;
  }
  .dock-icon svg{ width: 100%; height: 100%; display: block; }

  /* Open indicator dot below each icon */
  .dot{
    width: 5px; height: 5px; border-radius: 50%;
    margin-top: 8px;
    background: currentColor;
    box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
    opacity: 0;
    transition: opacity .25s ease;
  }
  .dock-item.is-open .dot{
    opacity: 1;
    animation: dot-pulse 2.2s ease-in-out infinite;
  }
  @keyframes dot-pulse{
    0%, 100% { transform: scale(1);   box-shadow: 0 0 6px currentColor, 0 0 12px currentColor; }
    50%      { transform: scale(1.35); box-shadow: 0 0 10px currentColor, 0 0 22px currentColor; }
  }

  /* Tooltip */
  .tip{
    position: absolute; bottom: calc(100% + 18px); left: 50%;
    transform: translateX(-50%) translateY(4px);
    padding: 6px 10px;
    background: rgba(10, 14, 28, 0.85);
    border: 1px solid rgba(0, 212, 255, 0.22);
    border-radius: 8px;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    box-shadow: 0 12px 30px -10px rgba(0,0,0,.7);
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--text); letter-spacing: .02em;
    white-space: nowrap; pointer-events: none;
    opacity: 0;
    transition: opacity .15s ease, transform .15s ease;
  }
  .tip::after{
    content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(0, 212, 255, 0.22);
  }
  .dock-item.is-hover .tip{
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* Color glow underlay — per icon, only on hover */
  .glow{
    position: absolute; inset: -10px;
    border-radius: 22px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s ease;
    filter: blur(14px);
    z-index: -1;
  }
  .dock-item.is-hover .glow{ opacity: .55; }
  .glow.browser{  background: radial-gradient(circle, rgba(255, 107, 0, 0.7), transparent 65%); }
  .glow.files{    background: radial-gradient(circle, rgba(6, 182, 212, 0.7), transparent 65%); }
  .glow.terminal{ background: radial-gradient(circle, rgba(0, 255, 136, 0.6), transparent 65%); }

  /* Make icon "lift" off the dock when hovered */
  .dock-item.is-hover .dock-icon{
    filter: drop-shadow(0 12px 16px rgba(0,0,0,.55));
  }
</style>
</head>
<body>
  <div class="desktop">
    <canvas id="particles"></canvas>

    <div class="hint">Hover the dock <b>&nbsp;·&nbsp;</b> magnification + tooltips + glow</div>

    <!-- ──────────────  Bottom-left brand  ────────────── -->
    <div class="brand">
      <!-- Geometric dragon — abstract, Kali-flavoured -->
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="dragon-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <!-- Head -->
        <path d="M4 16 L11 9 L17 11 L24 6 L28 11 L24 16 L28 21 L24 26 L17 21 L11 23 Z"
              stroke="url(#dragon-grad)" stroke-width="1.6" stroke-linejoin="round" fill="none" opacity=".95"/>
        <!-- Spine -->

        <!-- Eye -->
        <circle cx="22.5" cy="13" r="1.2" fill="#00d4ff"/>
        <circle cx="22.5" cy="13" r="0.5" fill="#fff"/>

    <!-- ──────────────  Dock  ────────────── -->

        <!-- 1 · BROWSER (Firefox Kali-style) -->
        <div class="dock-item is-open" data-id="browser" style="color: #ff6b00;">
          <div class="glow browser"></div>

              <defs>

              <ellipse cx="28" cy="28" rx="6" ry="14.5" fill="none" stroke="rgba(255,255,255,.16)" stroke-width=".5"/>

              <!-- inner flame highlight -->

          <div class="dot"></div>

          <div class="dock-icon" data-idx="1">

          <div class="tip">terminal.exe</div>
          <div class="dock-icon" data-idx="2">

<script>
/* ────────────────────────── Live clock ────────────────────────── */
(function clock(){
  const tEl = document.getElementById('clock-time');
  const dEl = document.getElementById('clock-date');
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function tick(){
    const now = new Date();
    tEl.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    dEl.textContent = days[now.getDay()] + ' ' + pad(now.getDate()) + ' ' + months[now.getMonth()];
  }
  tick(); setInterval(tick, 1000);
})();

/* ────────────────────────── Dock magnification ────────────────────────── */
(function dock(){
  const dock = document.getElementById('dock');
  const items = Array.from(dock.querySelectorAll('.dock-item'));
  const icons = items.map(it => it.querySelector('.dock-icon'));

  const SCALE_MAX = 1.35;      // focused icon
  const SCALE_ADJ = 1.15;      // adjacent icons
  const RANGE     = 110;       // px cosine falloff

  function setScale(idx, scale){
    const icon = icons[idx];
    // translate up so icon lifts above the dock surface
    const lift = (scale - 1) * 18;
    icon.style.transform = `translateY(${-lift}px) scale(${scale})`;
  }

  function clear(){
    icons.forEach(i => i.style.transform = '');
    items.forEach(i => i.classList.remove('is-hover'));
    dock.classList.remove('is-hovering');
  }

  dock.addEventListener('mousemove', (e) => {
    dock.classList.add('is-hovering');
    const mx = e.clientX;

    let nearestIdx = 0, nearestDist = Infinity;
    icons.forEach((icon, idx) => {
      const r = icon.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const d  = Math.abs(mx - cx);
      if (d < nearestDist){ nearestDist = d; nearestIdx = idx; }

      let scale = 1;
      if (d < RANGE){
        // cosine falloff: 1 → SCALE_MAX → 1
        const k = Math.cos((d / RANGE) * (Math.PI / 2));
        scale = 1 + (SCALE_MAX - 1) * k;
      }
      setScale(idx, scale);
    });

    items.forEach((it, idx) => {
      it.classList.toggle('is-hover', idx === nearestIdx && nearestDist < 60);
    });
  });

  dock.addEventListener('mouseleave', clear);

  // Click feedback — quick press
  items.forEach((it) => {
    const icon = it.querySelector('.dock-icon');
    icon.addEventListener('mousedown', () => {
      icon.style.transition = 'transform .08s ease';
      const m = (icon.style.transform || '').match(/scale\(([\d.]+)\)/);
      const s = m ? parseFloat(m[1]) : 1;
      icon.style.transform = `translateY(${-(s - 1) * 18}px) scale(${s * 0.92})`;
    });
    icon.addEventListener('mouseup', () => {
      icon.style.transition = '';
    });
  });
})();

/* ────────────────────────── Particle field ────────────────────────── */
(function particles(){
  const cv = document.getElementById('particles');
  const ctx = cv.getContext('2d');
  let W, H, parts;

  function resize(){
    W = cv.width  = window.innerWidth  * devicePixelRatio;
    H = cv.height = window.innerHeight * devicePixelRatio;
    cv.style.width  = window.innerWidth + 'px';
    cv.style.height = window.innerHeight + 'px';
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  function init(){
    const count = Math.min(60, Math.floor(window.innerWidth / 28));
    parts = [];
    for (let i = 0; i < count; i++){
      parts.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - .5) * 0.25,
        vy: (Math.random() - .5) * 0.25,
        r: Math.random() * 1.4 + 0.4,
      });
    }
  }
  function step(){
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < parts.length; i++){
      const p = parts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > window.innerWidth)  p.vx *= -1;
      if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 212, 255, 0.55)';
      ctx.fill();

      for (let j = i + 1; j < parts.length; j++){
        const q = parts[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 110){
          ctx.beginPath();
          ctx.strokeStyle = `rgba(0, 212, 255, ${0.12 * (1 - d / 110)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(step);
  }
  resize(); init(); step();
  window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
